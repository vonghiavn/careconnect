version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: carenet_postgres
    environment:
      POSTGRES_USER: carenet_user
      POSTGRES_PASSWORD: carenet_password
      POSTGRES_DB: carenet_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carenet_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: carenet_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
